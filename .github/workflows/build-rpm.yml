name: Build and Release RPM

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y rpmdevtools rpmlint git

      - name: Setup rpmbuild tree
        run: rpmdev-setuptree

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create source tarball
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cd /tmp
          cp -r $GITHUB_WORKSPACE minectl-${VERSION}
          tar czf /root/rpmbuild/SOURCES/minectl-${VERSION}.tar.gz \
            --exclude=.git \
            --exclude=.gitignore \
            --exclude='.*.sw*' \
            --exclude=.github \
            minectl-${VERSION}/

      - name: Prepare spec file
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Stamp the version from the git tag into the spec before building
          sed "s/^Version:.*/Version:        ${VERSION}/" minectl.spec \
            > /root/rpmbuild/SPECS/minectl.spec

      - name: Build RPM
        run: rpmbuild -ba /root/rpmbuild/SPECS/minectl.spec

      - name: Lint RPM
        run: rpmlint /root/rpmbuild/RPMS/noarch/*.rpm || true

      - name: Upload RPM to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /root/rpmbuild/RPMS/noarch/*.rpm
            /root/rpmbuild/SRPMS/*.rpm
