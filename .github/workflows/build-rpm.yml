name: Build and Release RPM

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8
      env:
        HOME: /root

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: dnf install -y rpmdevtools rpmlint

      - name: Set up rpmbuild tree
        run: rpmdev-setuptree

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create source tarball
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cp -r "$GITHUB_WORKSPACE" "/tmp/minectl-${VERSION}"
          tar czf "/root/rpmbuild/SOURCES/minectl-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='.github' \
            --exclude='.*.sw*' \
            -C /tmp \
            "minectl-${VERSION}/"

      - name: Prepare spec file
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed "s/^Version:.*/Version:        ${VERSION}/" minectl.spec \
            > /root/rpmbuild/SPECS/minectl.spec

      - name: Build RPM
        run: rpmbuild -ba /root/rpmbuild/SPECS/minectl.spec

      - name: Lint RPM
        run: rpmlint /root/rpmbuild/RPMS/noarch/*.rpm || true

      - name: Save RPM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: /root/rpmbuild/RPMS/noarch/*.rpm
          retention-days: 1

      - name: Attach RPM to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /root/rpmbuild/RPMS/noarch/*.rpm
            /root/rpmbuild/SRPMS/*.rpm

  publish-repo:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch (for static page files)
        uses: actions/checkout@v4

      - name: Download RPM from build job
        uses: actions/download-artifact@v4
        with:
          name: rpm-package
          path: /tmp/new-rpms/

      - name: Install createrepo_c
        run: |
          sudo apt-get update -q
          sudo apt-get install -y createrepo-c

      # Check out the existing gh-pages branch so we can carry forward
      # previous RPMs. continue-on-error handles the first-ever run when
      # the branch doesn't exist yet.
      - name: Checkout existing gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Build DNF repo
        run: |
          mkdir -p /tmp/pages/repo

          # Carry forward all previous RPMs (skips gracefully on first run)
          if [[ -d gh-pages/repo ]]; then
            cp gh-pages/repo/*.rpm /tmp/pages/repo/ 2>/dev/null || true
          fi

          # Add this release's RPM
          cp /tmp/new-rpms/*.rpm /tmp/pages/repo/

          # Regenerate repo metadata from the full set of RPMs
          createrepo_c /tmp/pages/repo/

          # Copy static files committed in .github/pages/
          cp .github/pages/minectl.repo /tmp/pages/
          cp .github/pages/install.sh   /tmp/pages/

      # Deploys /tmp/pages to the gh-pages branch.
      # keep_files: false is intentional — we've already merged the old
      # RPMs in above, so the full /tmp/pages is the authoritative state.
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/pages
          keep_files: false